name: test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -r runtime/requirements.txt httpx2==2.5.0
      - run: PYTHONPATH=runtime python -m unittest discover -s updater/tests -v
      - run: PYTHONPATH=runtime python -m unittest discover -s runtime/tests -v
      - run: python -m unittest discover -s installer/tests -p 'test_*.py' -v
      - run: python -m unittest discover -s ops/telemetry-receiver -p 'test_*.py' -v
      - run: python -m py_compile updater/spawnwp updater/build-release.py runtime/app.py runtime/scripts/blueprint.py
      - run: bash -n updater/publish-release.sh runtime/scripts/*.sh clients/knock.sh
      - run: bash installer/tests/static.sh
      - run: pip install -r website/requirements.txt
      - run: mkdocs build --strict
