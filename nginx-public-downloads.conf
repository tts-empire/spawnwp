# WordPress dev stack — proxy configuration
# HTTP→HTTPS redirect (managed by Certbot)
server {
    if ($host = devel.presenzaweb.net) {
        return 301 https://$host$request_uri;
    } # managed by Certbot
    if ($host = cockpit.presenzaweb.net) {
        return 301 https://$host$request_uri;
    }

    listen 80 default_server;
    listen [::]:80 default_server;
    server_name devel.presenzaweb.net cockpit.presenzaweb.net;
    return 404; # managed by Certbot
}

# HTTPS — reverse proxy to WordPress containers
server {
    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl;                  # managed by Certbot

    server_name devel.presenzaweb.net;

    ssl_certificate /etc/letsencrypt/live/devel.presenzaweb.net/fullchain.pem;     # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/devel.presenzaweb.net/privkey.pem;   # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf;                               # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;                                 # managed by Certbot

    client_max_body_size 64M;
    proxy_read_timeout   120s;
    proxy_send_timeout   120s;

    # Common proxy headers
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # WebSocket support (required by some WP tooling)
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_http_version 1.1;

    # HTTP Basic Auth — protegge l'intero dominio
    auth_basic           "WP Dev";
    auth_basic_user_file /etc/nginx/.htpasswd;

    # Public, read-only SpawnWP release artifacts.
    location /downloads/spawnwp-deploy/ {
        auth_basic off;
        alias /var/www/spawnwp-downloads/;
        autoindex off;
        default_type application/octet-stream;
        add_header Content-Disposition "attachment" always;
        add_header X-Content-Type-Options "nosniff" always;
        limit_except GET HEAD { deny all; }
    }

    # ── Primary WordPress (wp-dev, port 8080) ─────────────────────────────────
    # URL: https://devel.presenzaweb.net/
    location / {
        proxy_pass http://127.0.0.1:8080;

        # Graceful 502 when the container is down
        proxy_intercept_errors on;
        error_page 502 503 504 =502 @wp_down;
    }

    # ── Additional sites (subpath pattern) ────────────────────────────────────
    # Each new project gets a block like this. The prefix is stripped so the
    # container receives requests starting at /, while WordPress is configured
    # with WP_HOME=https://devel.presenzaweb.net/site-XXX
    #
    # location /site-XXX/ {
    #     proxy_pass http://127.0.0.1:<port>/;
    #     proxy_intercept_errors on;
    #     error_page 502 503 504 =502 @wp_down;
    # }
    # ──────────────────────────────────────────────────────────────────────────

    # ── patrizio (port 8081) ──────────────────────────────────────────────
    location /patrizio/ {
        include /etc/nginx/snippets/wp-proxy-headers.conf;
        proxy_set_header X-Forwarded-Prefix /patrizio;
        proxy_pass http://127.0.0.1:8081/;
        # On the /wp-admin directory redirect, the backend (internal nginx) emits
        # an absolute http Location WITHOUT the prefix (e.g. http://host/wp-admin/):
        # we rewrite it, re-adding /patrizio and forcing https. WordPress' own
        # redirects are already https+prefix, so they are not touched.
        proxy_redirect http://devel.presenzaweb.net/ https://devel.presenzaweb.net/patrizio/;
        proxy_intercept_errors on;
        error_page 502 503 504 =502 @wp_down;
    }
    location @wp_down {
        default_type text/plain;
        return 502 "WordPress container is not running. Start it with: make up\n";
    }
}

# ════════════════════════════════════════════════════════════════════════════
# cockpit.presenzaweb.net — admin subdomain (cockpit + Adminer + Mailpit)
# All knock-protected. Kept separate from the WordPress content domain so there
# is no slug conflict and the cockpit's Adminer auto-login stays same-origin.
# ════════════════════════════════════════════════════════════════════════════
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name cockpit.presenzaweb.net;

    ssl_certificate /etc/letsencrypt/live/devel.presenzaweb.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/devel.presenzaweb.net/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 64M;

    proxy_set_header Host      $host;
    proxy_set_header X-Real-IP $remote_addr;

    # HTTP Basic Auth — protects the whole admin subdomain
    auth_basic           "WP Cockpit";
    auth_basic_user_file /etc/nginx/.htpasswd;

    # ── Per-site Adminer (DB GUI) + Mailpit, knock-protected ──────────────────
    # ── wp-dev admin ──
    location /wp-dev-db/ {
        include /etc/nginx/cockpit-allowed.conf;
        proxy_pass http://127.0.0.1:9001/;
        add_header Cache-Control "no-store" always;
    }
    location /wp-dev-mail/ {
        include /etc/nginx/cockpit-allowed.conf;
        include /etc/nginx/snippets/wp-proxy-headers.conf;
        proxy_pass http://127.0.0.1:8025;
        add_header Cache-Control "no-store" always;
    }
    # ── patrizio admin ──
    location /patrizio-db/ {
        include /etc/nginx/cockpit-allowed.conf;
        proxy_pass http://127.0.0.1:9002/;
        add_header Cache-Control "no-store" always;
    }
    location /patrizio-mail/ {
        include /etc/nginx/cockpit-allowed.conf;
        include /etc/nginx/snippets/wp-proxy-headers.conf;
        proxy_pass http://127.0.0.1:8026;
        add_header Cache-Control "no-store" always;
    }
    # __COCKPIT_PER_SITE__  (new-project.sh inserts <name>-db / <name>-mail above this line)

    # Versioned cockpit assets are reusable between Manage and Deploy.
    location /assets/ {
        include /etc/nginx/cockpit-allowed.conf;
        proxy_pass http://127.0.0.1:9393/assets/;
        proxy_buffering on;
        add_header Cache-Control "public, max-age=604800, immutable" always;
    }

    # ── WP Cockpit dashboard (port 9393), served at the subdomain root ────────
    location / {
        include /etc/nginx/cockpit-allowed.conf;
        proxy_pass http://127.0.0.1:9393/;
        proxy_read_timeout 300s;
        proxy_buffering off;
        proxy_cache off;
        add_header Cache-Control "no-store" always;
    }
}

# Required for WebSocket proxy_set_header
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}
