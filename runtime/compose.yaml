name: ${COMPOSE_PROJECT_NAME:-wp-dev}

services:

  nginx:
    image: nginx:1.26-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:${WEB_PORT:-8080}:80"
    volumes:
      - wp_data:/var/www/html:ro
      - ./projects/primary/wp-content:/var/www/html/wp-content
      - ./docker/nginx:/etc/nginx/conf.d:ro
    depends_on:
      php:
        condition: service_healthy
    networks:
      - internal
    cap_drop: [ALL]
    cap_add: [CHOWN, SETUID, SETGID, NET_BIND_SERVICE]
    security_opt: [no-new-privileges:true]
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  php:
    build:
      context: ./docker/php
      args:
        PHP_VERSION: ${PHP_VERSION:-8.3}
        WORDPRESS_VERSION: ${WP_VERSION:-latest}
        SPAWNWP_CONTEXT_HASH: ${SPAWNWP_CONTEXT_HASH:-dev}
    image: wp-dev-php:${PHP_VERSION:-8.3}
    restart: unless-stopped
    extra_hosts:
      - "${DOMAIN:-dev.example.com}:host-gateway"
    volumes:
      - wp_data:/var/www/html
      - ./projects/primary/wp-content:/var/www/html/wp-content
      # Per-site PHP overrides (cockpit "PHP settings"): conf.d loads alphabetically,
      # so zz- wins over the baked custom.ini without rebuilding the shared image.
      - ./docker/php/zz-site.ini:/usr/local/etc/php/conf.d/zz-site.ini:ro
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: ${DB_NAME}
      WORDPRESS_DB_USER: ${DB_USER}
      WORDPRESS_DB_PASSWORD: ${DB_PASS}
      WORDPRESS_TABLE_PREFIX: ${DB_TABLE_PREFIX:-wp_}
      # Leave WORDPRESS_DEBUG EMPTY (not "false") when debug is off: the image's
      # wp-config does define('WP_DEBUG', !!getenv_docker('WORDPRESS_DEBUG','')),
      # and !!"false" is TRUE. The image ignores WORDPRESS_DEBUG_LOG/DISPLAY, so
      # WP_DEBUG_LOG/DISPLAY are set below in WORDPRESS_CONFIG_EXTRA instead.
      WORDPRESS_DEBUG: "${WP_DEBUG:-}"
      WORDPRESS_CONFIG_EXTRA: |
        define('DISALLOW_FILE_EDIT', true);
        define('DISABLE_WP_CRON', true);
        // Debug logs to wp-content/debug.log; on-screen display follows the
        // php.ini display_errors (the Deploy "display_errors" dev toggle) rather
        // than WordPress's default-on, so a stray plugin notice never breaks the
        // page by emitting output before headers.
        define('WP_DEBUG_LOG', true);
        define('WP_DEBUG_DISPLAY', null);
        define('WP_HOME', '${WP_HOME}');
        define('WP_SITEURL', '${WP_SITEURL}');
        define('SPAWNWP_DEPLOY_HEALTHCHECK_URL', 'http://nginx/');
        if (isset($$_SERVER['HTTP_X_FORWARDED_PROTO']) && $$_SERVER['HTTP_X_FORWARDED_PROTO'] === 'https') {
          $$_SERVER['HTTPS'] = 'on';
        }
        // Subpath via reverse proxy: the host nginx strips the prefix and
        // re-sends it in X-Forwarded-Prefix. We rebuild REQUEST_URI so redirects
        // (login) and permalinks include the /site prefix.
        if (!empty($$_SERVER['HTTP_X_FORWARDED_PREFIX'])) {
          $$__pfx = rtrim($$_SERVER['HTTP_X_FORWARDED_PREFIX'], '/');
          if (isset($$_SERVER['REQUEST_URI']) && strpos($$_SERVER['REQUEST_URI'], $$__pfx . '/') !== 0) {
            $$_SERVER['REQUEST_URI'] = $$__pfx . $$_SERVER['REQUEST_URI'];
          }
        }
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
    cap_drop: [ALL]
    cap_add: [CHOWN, SETUID, SETGID, DAC_OVERRIDE]
    security_opt: [no-new-privileges:true]
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    healthcheck:
      test: ["CMD", "php-fpm", "-t"]
      interval: 15s
      timeout: 10s
      retries: 3
      # 60s: the first run extracts the whole WP install into the empty volume;
      # under that I/O load the healthcheck may time out, and nginx (which
      # depends on php being healthy) would give up. Wide margin for the first time.
      start_period: 60s

  db:
    image: mariadb:10.11
    restart: unless-stopped
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mariadb/spawnwp.cnf:/etc/mysql/conf.d/spawnwp.cnf:ro
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASS}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASS}
    networks:
      - internal
    cap_drop: [ALL]
    cap_add: [CHOWN, SETUID, SETGID, DAC_OVERRIDE]
    security_opt: [no-new-privileges:true]
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 384M
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    environment:
      # Persistence: mail survives restart/reboot (SQLite on a volume)
      MP_DATABASE: /data/mailpit.db
      # Retention: message cap + max age (auto-cleanup)
      MP_MAX_MESSAGES: "2000"
      MP_MAX_AGE: "72h"
      # Webroot: serves the UI under the site subpath (e.g. /bellu-mail) so it can
      # be exposed behind Nginx without breaking the assets. Empty = root.
      MP_WEBROOT: ${MAILPIT_WEBROOT:-}
    volumes:
      - mailpit_data:/data
    networks:
      - internal
    ports:
      - "127.0.0.1:${MAILPIT_PORT:-8025}:8025"
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 64M
    healthcheck:
      # readyz lives under the webroot when MP_WEBROOT is set
      test: ["CMD-SHELL", "wget -qO- http://localhost:8025$${MP_WEBROOT}/readyz >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  adminer:
    image: adminer:5
    restart: unless-stopped
    environment:
      ADMINER_DEFAULT_SERVER: db
    networks:
      - internal
    ports:
      - "127.0.0.1:${ADMINER_PORT:-9001}:8080"
    depends_on:
      db:
        condition: service_healthy
    cap_drop: [ALL]
    cap_add: [CHOWN, SETUID, SETGID]
    security_opt: [no-new-privileges:true]
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: 48M
    healthcheck:
      test: ["CMD", "php", "-r", "exit(@fsockopen('127.0.0.1',8080)?0:1);"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 128mb --maxmemory-policy allkeys-lru
    networks:
      - internal
    profiles: [redis]
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: 160M
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  wp_data:
  db_data:
  mailpit_data:

networks:
  internal:
    driver: bridge
